name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: detect codebase type
        uses: ai-action/ollama-action@v2
        id: detect
        with:
          model: deepseek-coder:6.7b
          cache: true
          prompt: >
            Analyze this repository and return ONLY a JSON object with keys:
            language, framework, package_manager, entrypoint, port.
            No markdown fences, no commentary, no explanation - just the JSON.
            Example: {"language":"python","framework":"fastapi","package_manager":"pip","entrypoint":"main:app","port":8000}

      - name: validate detection output
        id: validate_detect
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          # Strip accidental markdown fences before validating
          clean=$(echo "$response" | sed -e '/^```/d')

          if ! echo "$clean" | jq empty 2>/dev/null; then
            echo "ERROR: detection step did not return valid JSON"
            echo "$clean"
            exit 1
          fi

          {
            echo "json<<DETECT_EOF"
            echo "$clean"
            echo "DETECT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: generate container recipe
        uses: ai-action/ollama-action@v2
        id: model
        with:
          model: deepseek-coder:6.7b
          cache: true
          prompt: |
            Generate a Dockerfile for this project. Detection result: ${{ steps.validate_detect.outputs.json }}
            Requirements: use a multi-stage build, minimize image size, use an alpine or distroless base image.
            Reply with ONLY the raw Dockerfile contents - no markdown fences, no commentary, no explanation.

      - name: write dockerfile
        env:
          response: ${{ steps.model.outputs.response }}
        run: |
          # Strip accidental markdown fences
          echo "$response" | sed -e '/^```/d' > Dockerfile

      - name: validate dockerfile
        run: |
          if ! grep -qE '^FROM ' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no FROM instruction found"
            exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no CMD or ENTRYPOINT found"
            exit 1
          fi
          if ! grep -qE '^(COPY|ADD)' Dockerfile; then
            echo "::warning::No COPY/ADD found - check if files are copied correctly"
          fi

      - name: commit dockerfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: generate Dockerfile via plutoploy bot"
          git push
