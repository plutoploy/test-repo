name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: checkout
        uses: actions/checkout@main # v4.2.2
        with:
          token: ${{ github.token }}
      - name: check for existing containerfile
        id: existing
        run: |
          if [ -f "Containerfile" ] || [ -f "Dockerfile" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "NOTE: A Containerfile or Dockerfile already exists in this repository."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi


      - name: gather codebase context
        id: context
        run: |
          {
            echo "REPOSITORY FILE TREE:"
            find . -type f -not -path './.git/*' -not -path './.github/*' | sort | head -150
            echo ""
            echo "KEY CONFIGURATION FILES:"
            for file in package.json requirements.txt pyproject.toml Cargo.toml go.mod pom.xml build.gradle Gemfile composer.json Makefile Justfile Taskfile.yaml; do
              if [ -f "$file" ]; then
                echo ""
                echo "--- $file ---"
                cat "$file"
              fi
            done
            echo ""
            echo "KNOWN ENTRY POINTS (full contents):"
            for entry in main.py app.py manage.py server.py index.ts server.ts main.go cmd/main.go main.rs src/main.rs src/bin/*.rs src/lib.rs pubspec.yaml Application.java Main.java; do
              if [ -f "$entry" ]; then
                echo ""
                echo "=== $entry (FULL) ==="
                cat "$entry"
              fi
            done
            echo ""
            echo "OTHER SOURCE FILES (first 40 lines each):"
            find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" -o -name "*.rs" -o -name "*.java" -o -name "*.rb" -o -name "*.php" \) \
              -not -path './.git/*' -not -name "main.py" -not -name "app.py" -not -name "index.ts" -not -name "server.ts" -not -name "main.go" -not -name "main.rs" \
              | head -15 | while read -r f; do
                echo ""
                echo "=== $f ==="
                head -n 40 "$f"
              done
          } > repo_context.txt

          # Truncate at line boundary to avoid mid-line cuts
          total=0
          while IFS= read -r line; do
            linelen=${#line}
            if [ $((total + linelen + 1)) -le 12000 ]; then
              echo "$line"
              total=$((total + linelen + 1))
            else
              break
            fi
          done < repo_context.txt > repo_context_trimmed.txt

          delimiter="EOF_$(date +%s)_$$"
          {
            echo "content<<${delimiter}"
            cat repo_context_trimmed.txt
            echo
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: detect codebase type and generate
        uses: ai-action/ollama-action@master 
        id: detect
        with:
          model: gemma4:12b
          prompt: >
            You are given the following codebase context. Analyze it and return ONLY a Containerfile to containerize this application.
            No markdown fences, no commentary, no explanation — just the raw Containerfile contents.
            The Containerfile MUST include a CMD or ENTRYPOINT instruction.
            Use only official base images from Docker Hub or the Fedora/CentOS/Alpine registries.
            Do NOT include any curl|sh, wget|sh, chmod 777, or network fetch-and-execute patterns.
            CODEBASE CONTEXT:
            ${{ steps.context.outputs.content }}

      - name: clean and write Containerfile
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          clean=$(echo "$response" | sed -e '/^```/d' -e '/^```Containerfile/d' -e '/^```Dockerfile/d')

          if ! echo "$clean" | grep -qE '^FROM '; then
            echo "ERROR: AI response missing FROM instruction. Raw output:"
            echo "$response"
            exit 1
          fi

          echo "$clean" > Containerfile

      - name: validate Containerfile structure
        run: |
          echo "--- Generated Containerfile ---"
          cat Containerfile
          echo "------------------------------"

          if ! grep -qE '^FROM ' Containerfile; then
            echo "ERROR: No FROM instruction found"
            exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Containerfile; then
            echo "ERROR: No CMD or ENTRYPOINT instruction found"
            exit 1
          fi

      - name: validate Containerfile safety
        run: |
          blocked_patterns=(
            'curl.*\|.*sh'
            'wget.*\|.*sh'
            'chmod 777'
            'chmod -R 777'
            '/dev/tcp'
            'nc -[epl]'
            'ncat '
            'base64 -d'
            'eval.*\$('
          )
          for pattern in "${blocked_patterns[@]}"; do
            if grep -qiE "$pattern" Containerfile; then
              echo "ERROR: Blocked pattern detected in Containerfile: $pattern"
              echo "This may indicate prompt injection or unsafe AI output."
              exit 1
            fi
          done
          echo "Safety checks passed."

      - name: ensure .dockerignore exists
        run: |
          if [ ! -f .dockerignore ]; then
            cat > .dockerignore << 'DOCKERIGNORE'
            .git
            .github
            node_modules
            __pycache__
            .venv
            venv
            .mypy_cache
            .pytest_cache
            .ruff_cache
            *.pyc
            .env
            .env.*
           !.env.example
            target
            Cargo.lock
            *.tar.gz
            .DS_Store
            DOCKERIGNORE
            echo "Created .dockerignore"
          else
            echo ".dockerignore already exists"
          fi

      - name: verify Containerfile builds
        run: |
          if command -v buildah &> /dev/null; then
            buildah bud --layers=false -f Containerfile . && echo "Build verification passed." || {
              echo "WARNING: Containerfile failed build verification."
              echo "The file will still be included in the PR for manual review."
            }
          elif command -v docker &> /dev/null; then
            docker build --no-cache -f Containerfile . && echo "Build verification passed." || {
              echo "WARNING: Containerfile failed build verification."
              echo "The file will still be included in the PR for manual review."
            }
          else
            echo "SKIP: Neither buildah nor docker available for build verification."
          fi

      - name: create branch and commit
        id: commit
        run: |
          git config user.name "plutoploy-gh[bot]"
          git config user.email "plutoploy-gh-bot[bot]@users.noreply.github.com"
          git add Containerfile .dockerignore
          git diff --cached --quiet && echo "No changes to commit" && echo "changed=false" >> "$GITHUB_OUTPUT" && exit 0

          git commit -m "chore: generate Containerfile via plutoploy bot"
          git push 
          echo "changed=true" >> "$GITHUB_OUTPUT"
          # echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_warning=""
          if [ "${{ steps.existing.outputs.exists }}" == "true" ]; then
            existing_warning="

          ⚠️ **Warning:** A Containerfile or Dockerfile already existed in this repository before this run. Please compare carefully before merging."
          fi

          gh pr create \
            --title "chore: generate Containerfile" \
            --body "Automated Containerfile generated by **plutoploy bot** using \`gemma3:12b\`.

          **This PR requires human review before merging.** AI-generated container builds can contain errors or unsafe instructions.${existing_warning}

          ### What was generated
          - \`Containerfile\` — container build instructions
          - \`.dockerignore\` — exclude list (only created if absent)

          ### Review checklist
          - [ ] Base image is appropriate and from a trusted source
          - [ ] No unnecessary privileges or dangerous \`RUN\` instructions
          - [ ] Dependencies are correctly installed
          - [ ] Entry point (\`CMD\`/\"ENTRYPOINT\") matches the application
          - [ ] Build was verified (check the \`verify Containerfile builds\` step above)
          - [ ] Test the build locally: \`podman build -f Containerfile .\`" \
            --base "${{ github.ref_name }}" \
            --label "automated" \
            --label "needs-review"
