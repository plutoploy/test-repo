name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: gather codebase context
        id: context
        run: |
          # Build a structured summary of the repo
          {
            echo "REPOSITORY FILE TREE:"
            find . -type f -not -path './.git/*' -not -path './.github/*' | sort | head -100
            echo ""
            echo "KEY CONFIGURATION FILES:"

            for file in package.json requirements.txt Cargo.toml go.mod pom.xml build.gradle Gemfile composer.json; do
              if [ -f "$file" ]; then
                echo ""
                echo "--- $file ---"
                cat "$file"
              fi
            done

            echo ""
            echo "SOURCE CODE SNIPPETS (first 30 lines each):"
            find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" -o -name "*.rs" -o -name "*.java" -o -name "*.rb" -o -name "*.php" \) -not -path './.git/*' | head -15 | while read -r f; do
              echo ""
              echo "=== $f ==="
              head -n 30 "$f"
            done
          } > repo_context.txt

          # Truncate to ~12KB to stay within context limits for gemma4:12b
          head -c 12000 repo_context.txt > repo_context_trimmed.txt

          # Export for next step
          echo "content<<EOF" >> $GITHUB_OUTPUT
          cat repo_context_trimmed.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: detect codebase type and generate Dockerfile
        uses: ai-action/ollama-action@master
        id: detect
        with:
          model: gemma4:12b
          cache: true
          prompt: >
            You are given the following codebase context. Analyze it and return ONLY a Dockerfile to containerize this application.
            No markdown fences, no commentary, no explanation — just the raw Dockerfile contents.
            The Dockerfile MUST include a CMD or ENTRYPOINT instruction.

            CODEBASE CONTEXT:
            ${{ steps.context.outputs.content }}

      - name: clean and write dockerfile
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          clean=$(echo "$response" | sed -e '/^```/d' -e '/^```dockerfile/d')

          if ! echo "$clean" | grep -qE '^FROM '; then
            echo "ERROR: AI response missing FROM instruction. Raw:"
            echo "$response"
            exit 1
          fi

          echo "$clean" > Dockerfile

      - name: validate dockerfile
        run: |
          cat Dockerfile
          if ! grep -qE '^FROM ' Dockerfile; then
            echo "ERROR: No FROM instruction"; exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Dockerfile; then
            echo "ERROR: No CMD or ENTRYPOINT"; exit 1
          fi

      - name: commit dockerfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: generate Dockerfile via plutoploy bot" && git push)
