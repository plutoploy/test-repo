name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: gather codebase context
        id: context
        run: |
          {
            echo "REPOSITORY FILE TREE:"
            find . -type f -not -path './.git/*' -not -path './.github/*' | sort | head -100
            echo ""
            echo "KEY CONFIGURATION FILES:"
            for file in package.json requirements.txt Cargo.toml go.mod pom.xml build.gradle Gemfile composer.json; do
              if [ -f "$file" ]; then
                echo ""
                echo "--- $file ---"
                cat "$file"
              fi
            done
            echo ""
            echo "SOURCE CODE SNIPPETS (first 30 lines each):"
            find . -type f \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" -o -name "*.rs" -o -name "*.java" -o -name "*.rb" -o -name "*.php" \) -not -path './.git/*' | head -15 | while read -r f; do
              echo ""
              echo "=== $f ==="
              head -n 30 "$f"
            done
          } > repo_context.txt
          head -c 12000 repo_context.txt > repo_context_trimmed.txt
          delimiter="EOF_$(date +%s)_$$"
           {
             echo "content<<${delimiter}"
             cat repo_context_trimmed.txt
             echo
             echo "${delimiter}"
           } >> "$GITHUB_OUTPUT"

      - name: detect codebase type and generate
        uses: ai-action/ollama-action@e4d8e5a7b4b69a8ae27c1b6d552836d8f4e21dee
        id: detect
        with:
          model: gemma4:12b
          cache: true
          prompt: >
            You are given the following codebase context. Analyze it and return ONLY a Containerfile to containerize this application.
            No markdown fences, no commentary, no explanation — just the raw Containerfile contents.
            The Containerfile MUST include a CMD or ENTRYPOINT instruction.
            CODEBASE CONTEXT:
            ${{ steps.context.outputs.content }}

      - name: clean and write Containerfile
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          clean=$(echo "$response" | sed -e '/^```/d' -e '/^```Containerfile/d')

          if ! echo "$clean" | grep -qE '^FROM '; then
            echo "ERROR: AI response missing FROM instruction. Raw:"
            echo "$response"
             exit 1
           fi

          echo "$clean" > Containerfile

      - name: validate Containerfile
        run: |
          cat Containerfile
          if ! grep -qE '^FROM ' Containerfile; then
            echo "ERROR: No FROM instruction"; exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Containerfile; then
            echo "ERROR: No CMD or ENTRYPOINT"; exit 1
          fi

      - name: commit Containerfile
        run: |
          git config user.name "plutoploy-gh[bot]"
          git config user.email "plutoploy-gh-bot[bot]@users.noreply.github.com"
          git add Containerfile
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: generate Containerfile via plutoploy bot" && git push)
