name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  id_token: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@main

      - name: detect codebase type
        uses: ai-action/ollama-action@master
        id: detect
        with:
          model: gemma4:12b
          cache: true
          prompt: >
            Analyze this codebase and return ONLY a recipe to generate a oci container image 
            No markdown fences, no commentary, no explanation - just the contents of the dockerfile.

      - name: validate detection output
        id: validate_detect
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          clean=$(echo "$response" | sed -e '/^```/d')

      - name: generate container recipe
        uses: ai-action/ollama-action@master
        id: model
        with:
          model: gemma4:12b
          cache: true
          prompt: |
            Review the recipe "${{ steps.detect.outputs.response }}" and make sure that it has a `CMD []` block

      - name: write dockerfile
        env:
          response: ${{ steps.model.outputs.response }}
        run: |
          echo "$response" | sed -e '/^```/d' > Dockerfile

      - name: validate dockerfile
        run: |
          if ! grep -qE '^FROM ' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no FROM instruction found"
            exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no CMD or ENTRYPOINT found"
            exit 1
          fi
          if ! grep -qE '^(COPY|ADD)' Dockerfile; then
            echo "::warning::No COPY/ADD found - check if files are copied correctly"
          fi

      - name: commit dockerfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: generate Dockerfile via plutoploy bot"
          git push
