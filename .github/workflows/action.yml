name: plutoploy bot

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  detect-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Needed for push

      - name: detect codebase type
        uses: ai-action/ollama-action@master
        id: detect
        with:
          model: gemma4:12b
          cache: true
          prompt: >
            Analyze this codebase and return ONLY a recipe to generate an OCI container image.
            No markdown fences, no commentary, no explanation — just the contents of the Dockerfile.
            The recipe MUST include a CMD instruction.

      - name: clean and write dockerfile
        id: write
        env:
          response: ${{ steps.detect.outputs.response }}
        run: |
          # Strip markdown fences and write
          clean=$(echo "$response" | sed -e '/^```/d' -e '/^```dockerfile/d')
          
          # Basic sanity check before writing
          if ! echo "$clean" | grep -qE '^FROM '; then
            echo "ERROR: AI response missing FROM instruction"
            echo "Raw response:"
            echo "$response"
            exit 1
          fi
          
          echo "$clean" > Dockerfile
          echo "dockerfile_written=true" >> $GITHUB_OUTPUT

      - name: validate dockerfile
        if: steps.write.outputs.dockerfile_written == 'true'
        run: |
          echo "=== Generated Dockerfile ==="
          cat Dockerfile
          echo "============================"
          
          if ! grep -qE '^FROM ' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no FROM instruction found"
            exit 1
          fi
          if ! grep -qE '^(CMD|ENTRYPOINT)' Dockerfile; then
            echo "ERROR: Invalid Dockerfile - no CMD or ENTRYPOINT found"
            exit 1
          fi
          if ! grep -qE '^(COPY|ADD)' Dockerfile; then
            echo "::warning::No COPY/ADD found - check if files are copied correctly"
          fi

      - name: commit dockerfile
        if: steps.write.outputs.dockerfile_written == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff --cached --quiet && echo "No changes to commit" || {
            git commit -m "chore: generate Dockerfile via plutoploy bot"
            git push
          }
